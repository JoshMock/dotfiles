windowrule = workspace 1, class:firefox-developer-edition
windowrule = workspace 1, class:org.mozilla.firefox

windowrule = workspace 2 silent, class:kitty

# group chat windows
windowrule = tag +chat, class:Slack
windowrule = tag +chat, class:Element
windowrule = tag +chat, class:^(im\.riot\.Riot)$
windowrule = tag +chat, class:discord
windowrule = tag +chat, title:Discord
windowrule = workspace 3 silent, tag:chat
windowrule = group set, tag:chat

windowrule = workspace 4 silent, class:firefox-personal

windowrule = workspace 5 silent, tag:zoom
# windowrule = idle_inhibit focus, tag:zoom
windowrule = tag +media, tag:zoom
# windowrule = float, tag:zoom, title:menu window

windowrule = workspace 5 silent, class:vlc
windowrule = tag +media, class:vlc
# windowrule = no_blur, class:vlc, float:1
# windowrule = no_dim, class:vlc, float:1
windowrule = opaque, class:vlc, float:1

windowrule = workspace 5 silent, class:cava
windowrule = float, class:cava
windowrule = opacity 0.3 0.3, class:cava

windowrule = workspace 6 silent, class:firefox-mopidy-iris

windowrule = workspace 7 silent, class:com.obsproject.Studio

# windowrule = stay_focused on, tag:prompt
windowrule = float, tag:prompt
windowrule = size <60% <60%, tag:prompt

windowrule = tag +prompt, class:1password, float:1
windowrule = size 400 400, class:1password, float:1

# keep password prompt windows up front
windowrule = tag +prompt, class:.*polkit.*
windowrule = tag +prompt, class:Pinentry-gtk
windowrule = tag +prompt, class:nm-applet
windowrule = tag -prompt, title:as_toolbar
windowrule = tag -prompt, title:.*Discord.*

# zoom ughhhh
windowrule = tag +zoom, class:Zoom Workplace
windowrule = tag +zoom, class:.*zoom.*
windowrule = tag +zoom, title:zoom_linux_float_video_window
windowrule = tag +zoom, title:cpt_frame_xcb_window
windowrule = tag +zoom, title:.*app\.zoom\.us.*

# Zoom popup/menu fixes - use same approach as vlc-menu and menu rules
windowrule {
  name = zoom-popups
  match:class = ^(zoom)$
  match:float = on
  no_blur = on
  no_dim = on
  opaque = on
  move = onscreen
}

# Specifically handle Zoom utility/menu windows
windowrule {
  name = zoom-menus
  match:class = ^(zoom)$
  match:title = ^(menu window|popup window|as_toolbar|cpt_frame_window)$
  no_blur = on
  no_dim = on
  opaque = on
  move = onscreen
}

# modal windows
windowrule {
  name = modal
  match:tag = modal
  float = on
  size = <60% <60%
  center = on
}
windowrule = tag +modal, match:class org.pulseaudio.pavucontrol
windowrule = tag +modal, match:class com.saivert.pwvucontrol
windowrule = tag +modal, match:class blueman-manager

# disable some effects for menu windows
# windowrule = no_blur, tag:menu
# windowrule = no_dim, tag:menu
windowrule = opaque, tag:menu

# media windows should be opaque
# windowrule = no_blur, tag:media
# windowrule = no_dim, tag:media
windowrule = opaque, tag:media
windowrule = tag +media, title:.*meeting.*
windowrule = tag +media, title:.*playing.*, class:.*firefox.*
windowrule = tag +media, title:.*YouTube.*
windowrule = tag +media, title:.*All Hands.*
windowrule = tag +media, title:.*Devtools.*
#windowrule = tag +media, content 2
windowrule = tag -media, title:^(zoom_linux_float_video_window)$
windowrule = tag -media, title:^(as_toolbar)$

# all floating windows should not blur or dim
# windowrule = no_blur, float:1
# windowrule = no_dim, float:1
# windowrule = opaque, float:1

# fullscreen windows should not blur or dim
# windowrule = no_blur, fullscreen:on
# windowrule = no_dim, fullscreen:on
windowrule = opaque, fullscreen:on

# Firefox picture-in-picture
# windowrule = no_blur, title:Picture-in-Picture
# windowrule = no_dim, title:Picture-in-Picture
windowrule = opaque, title:Picture-in-Picture
windowrule = float, title:Picture-in-Picture
windowrule = pin, title:Picture-in-Picture
